syntax = "proto3";

package marketplace;

// Required Client-Facing Operations 
service MarketplaceService {
  // Add a new item listing
  rpc CreateItem(CreateItemRequest) returns (ActionResponse);
  
  // Retrieve current state of a specific item
  rpc GetItem(GetItemRequest) returns (MarketplaceItem);
  
  // Search items by keyword, category, or filter
  rpc SearchItems(SearchRequest) returns (SearchResponse);
  
  // Update item metadata (description, quantity, status)
  rpc UpdateItem(UpdateItemRequest) returns (ActionResponse);
  
  // Submit a bid on an auction-enabled item
  rpc PlaceBid(BidRequest) returns (ActionResponse);

  // Persistent Auction Participation
  // Join an auction and receive a stream of updates whenever the state changes
  rpc JoinAuction(AuctionRequest) returns (stream AuctionEvent);
}

//  4.1 Controller & Internal Coordination 
service InternalService {
  // Heartbeat-based failure detection
  rpc Heartbeat(Ping) returns (Pong);
  
  // Manage replica membership and state transfer
  rpc ReplicateData(SyncRequest) returns (SyncResponse);
  
  // Recovery: Replacement replica catches up with state
  rpc GetFullState(StateRequest) returns (StateResponse);
}

//  3.1 Required Item Schema 
message MarketplaceItem {
  string item_id = 1;
  string seller_id = 2;
  string title = 3;
  string category = 4;
  string description = 5;
  double starting_price = 6;
  double current_price = 7;
  int32 quantity = 8;
  string status = 9;             // "AVAILABLE", "SOLD", "AUCTION_ACTIVE"
  uint64 version = 10;           // version or sequence_number for consistency
}

//  Message Definitions 

message CreateItemRequest {
  MarketplaceItem item = 1;
}

message GetItemRequest {
  string item_id = 1;
}

message SearchRequest {
  string query = 1;              // keyword
  string category = 2;           // optional filter
}

message SearchResponse {
  repeated MarketplaceItem items = 1;
}

message UpdateItemRequest {
  string item_id = 1;
  // Fields to update
  optional string description = 2;
  optional int32 quantity = 3;
  optional string status = 4;
  uint64 expected_version = 5;    // For optimistic concurrency control
}

message BidRequest {
  string item_id = 1;
  string bidder_id = 2;
  double bid_amount = 3;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
  uint64 new_version = 3;
}

message AuctionRequest {
  string item_id = 1;
  string user_id = 2;
}

message AuctionEvent {
  enum EventType {
    NEW_BID = 0;
    STATUS_CHANGE = 1;
    AUCTION_CLOSED = 2;
  }
  EventType type = 1;
  MarketplaceItem item_snapshot = 2;
  string event_description = 3;
}

//  Coordination Messages 

message SyncRequest {
  MarketplaceItem item = 1;
  string primary_id = 2;
}

message SyncResponse {
  bool success = 1;
}

message StateRequest {
  string replica_id = 1;
}

message StateResponse {
  repeated MarketplaceItem all_items = 1;
}

message Ping {
  string node_id = 1;
  enum NodeType {
    SERVICE = 0;
    STORAGE = 1;
  }
  NodeType type = 2;
}

message Pong {
  bool healthy = 1;
}
