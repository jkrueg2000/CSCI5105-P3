apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 50051
      targetPort: 50051

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "12345"
    spec:
      containers:
        - name: frontend
          image: kv-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
            - containerPort: 12345
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: "50051"
            - name: STORAGE_PORT
              value: "50052"
          
          # REQUIRED FOR CPU AUTOSCALING: 
          # Defines the baseline CPU this pod expects to use.
          # 100m = 100 millicores (0.1 CPU). Adjust this based on your app's actual load.
          resources:
            requests:
              cpu: "100m"
          
          # Native K8s gRPC Liveness Probe (Restarts failed nodes)
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            
          # Native K8s gRPC Readiness Probe (Stops routing traffic if busy/booting)
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 5

---

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when average CPU across all pods hits 70% of their requested amount
          averageUtilization: 70